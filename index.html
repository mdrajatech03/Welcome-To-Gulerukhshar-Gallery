<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulerukhshar Gallery</title>
    <style>
        :root {
            --primary-color: #E60023; /* Pinterest Red */
            --dark-color: #111;
            --light-gray: #f0f0f0;
            --card-gray: #e9e9e9;
            --dark-gray: #717171;
            --white: #fff;
            --border-radius: 20px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--white);
            color: var(--dark-color);
            padding-bottom: 60px;
        }

        /* Navbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
            background-color: var(--white);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: var(--light-gray);
            padding: 12px 20px;
            border-radius: 30px;
            width: 40%;
            max-width: 500px;
            transition: var(--transition);
            border: 2px solid transparent;
        }

        .search-box:focus-within {
            border-color: var(--dark-color);
            background-color: var(--white);
        }

        .search-box input {
            border: none;
            background: none;
            outline: none;
            width: 100%;
            font-size: 15px;
            margin-left: 10px;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            font-weight: 700;
            font-size: 14px;
            border-radius: 24px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .btn-red {
            background-color: var(--primary-color);
            color: var(--white);
        }

        .btn-red:hover {
            background-color: #ad081b;
            transform: scale(1.02);
        }

        .btn-outline {
            background-color: transparent;
            border: 2px solid var(--dark-gray);
            color: var(--dark-gray);
        }

        .btn-outline:hover {
            background-color: var(--light-gray);
            color: var(--dark-color);
        }

        /* Tabs Section */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 20px;
            font-weight: 700;
            color: var(--dark-gray);
            cursor: pointer;
            padding-bottom: 8px;
            border-bottom: 3px solid transparent;
            transition: var(--transition);
        }

        .tab-btn.active, .tab-btn:hover {
            color: var(--dark-color);
            border-bottom: 3px solid var(--dark-color);
        }

        /* Gallery Grid */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .card {
            background-color: var(--card-gray);
            border-radius: var(--border-radius);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        /* 1:1 Aspect Ratio Fixed Frame */
        .card img, .card video {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            transition: var(--transition);
        }

        .card:hover img {
            transform: scale(1.02);
        }

        .card-info {
            padding: 15px 18px;
            background: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 55%;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Styled Download Button */
        .download-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: var(--light-gray);
            color: var(--dark-color);
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 20px;
            text-decoration: none;
            transition: var(--transition);
        }

        .download-btn:hover {
            background-color: var(--dark-color);
            color: var(--white);
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--dark-gray);
            transition: var(--transition);
        }

        .action-btn:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        .delete-btn {
            color: var(--primary-color);
            display: none; /* Only shown in Owner Mode */
        }

        .hidden {
            display: none;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--white);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            position: relative;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 28px;
            cursor: pointer;
            color: var(--dark-gray);
            transition: var(--transition);
        }

        .close-btn:hover {
            color: var(--dark-color);
        }

        .modal-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark-gray);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--light-gray);
            border: 2px solid transparent;
            border-radius: 16px;
            font-size: 15px;
            outline: none;
            transition: var(--transition);
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--dark-color);
            background-color: var(--white);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: var(--white);
            padding: 15px;
            font-weight: 700;
            font-size: 16px;
            border-radius: 24px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #ad081b;
        }

        /* Mobile Responsive adjustments */
        @media (max-width: 768px) {
            header {
                padding: 12px 18px;
            }
            .search-box {
                display: none; /* Hide search on small screens */
            }
            .gallery-container {
                padding: 0 16px;
            }
            .section-grid {
                grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
                gap: 14px;
            }
            .card img, .card video {
                height: auto;
            }
            .modal-content {
                padding: 28px 22px;
            }
            .card-title {
                max-width: 45%;
                font-size: 13px;
            }
            .download-btn {
                padding: 6px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">
            <svg height="24" width="24" viewBox="0 0 24 24" fill="#E60023">
                <path d="M12 0C5.373 0 0 5.373 0 12c0 5.092 3.166 9.444 7.64 11.19-.071-.839-.142-2.115.029-3.024.183-.984 1.182-5.187 1.182-5.187s-.3-.6-.3-1.55c0-1.452.842-2.571 1.889-2.571 1.366 0 1.95.897 1.95 2.016 0 1.23-.789 3.067-1.196 4.767-.339 1.42.719 2.583 2.131 2.583 2.559 0 4.408-2.738 4.408-5.772 0-3.033-2.144-5.266-5.275-5.266-3.616 0-5.787 2.627-5.787 5.438 0 1.056.402 2.181.91 2.798.106.128.121.242.086.438l-.348 1.411c-.049.198-.182.245-.407.136-1.503-.699-2.28-2.39-2.28-4.303 0-3.568 2.668-6.862 7.747-6.862 4.093 0 7.23 2.951 7.23 6.94 0 4.22-2.399 7.502-5.833 7.502-1.139 0-2.208-.597-2.574-1.293l-.681 2.648c-.247.962-.916 2.158-1.378 2.894C10.749 23.682 11.361 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"></path>
            </svg>
            <span>Guleshar</span>
        </a>

        <div class="search-box">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--dark-gray)"><path d="M21.53 20.47l-4.72-4.72a7.92 7.92 0 10-1.06 1.06l4.72 4.72a.75.75 0 001.06-1.06zM10.5 16A5.5 5.5 0 1116 10.5 5.506 5.506 0 0110.5 16z"></path></svg>
            <input type="text" id="searchInput" placeholder="Search photos & videos" onkeyup="searchMedia()">
        </div>

        <div class="nav-actions">
            <button class="btn btn-outline" id="ownerLoginBtn" onclick="toggleOwnerMode()">Owner Login</button>
            <button class="btn btn-red" id="openUploadModal">Upload Media</button>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('photos')">Photos</button>
        <button class="tab-btn" onclick="switchTab('videos')">Videos</button>
    </div>

    <div class="gallery-container">
        <div id="photos-section" class="section-grid">
            </div>

        <div id="videos-section" class="section-grid hidden">
            </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeUploadModal">&times;</span>
            <div class="modal-title">Upload New Media</div>
            <form id="mediaForm">
                <div class="form-group">
                    <label for="mediaTitle">Title / Caption</label>
                    <input type="text" id="mediaTitle" placeholder="Enter media title" required>
                </div>
                <div class="form-group">
                    <label for="mediaType">Type</label>
                    <select id="mediaType">
                        <option value="photo">Photo</option>
                        <option value="video">Video</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="mediaFileInput">Choose File</label>
                    <input type="file" id="mediaFileInput" accept="image/*,video/*" required>
                </div>
                <button type="submit" class="submit-btn">Add to Gallery</button>
            </form>
        </div>
    </div>

    <script>
        let isOwner = false;
        
        // Load data from localStorage or fallback to defaults
        let photos = JSON.parse(localStorage.getItem('savedPhotos')) || [
            { id: 1, title: "Nature Mountain View", url: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800" },
            { id: 2, title: "Beautiful Sunset", url: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800" }
        ];

        let videos = JSON.parse(localStorage.getItem('savedVideos')) || [
            { id: 1, title: "Ocean Waves", url: "https://assets.mixkit.co/videos/preview/mixkit-waves-of-the-sea-1175-high.mp4" }
        ];

        function saveToStorage() {
            localStorage.setItem('savedPhotos', JSON.stringify(photos));
            localStorage.setItem('savedVideos', JSON.stringify(videos));
        }

        function renderGallery() {
            const photoSection = document.getElementById('photos-section');
            const videoSection = document.getElementById('videos-section');

            photoSection.innerHTML = "";
            videoSection.innerHTML = "";

            photos.forEach(item => {
                photoSection.innerHTML += `
                    <div class="card">
                        <img src="${item.url}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/300x300?text=File+Not+Found'">
                        <div class="card-info">
                            <span class="card-title">${item.title}</span>
                            <div class="card-actions">
                                <a href="${item.url}" download="${item.title}" class="download-btn">⬇️ Download</a>
                                <button class="action-btn delete-btn" onclick="deleteItem('photo', ${item.id})" title="Delete">&#128465;</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            videos.forEach(item => {
                videoSection.innerHTML += `
                    <div class="card">
                        <video src="${item.url}" controls></video>
                        <div class="card-info">
                            <span class="card-title">${item.title}</span>
                            <div class="card-actions">
                                <a href="${item.url}" download="${item.title}" class="download-btn">⬇️ Download</a>
                                <button class="action-btn delete-btn" onclick="deleteItem('video', ${item.id})" title="Delete">&#128465;</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            toggleDeleteButtonsVisibility();
        }

        function switchTab(tabName) {
            const photoBtn = document.querySelector('.tab-btn:nth-child(1)');
            const videoBtn = document.querySelector('.tab-btn:nth-child(2)');
            const photoSec = document.getElementById('photos-section');
            const videoSec = document.getElementById('videos-section');

            if (tabName === 'photos') {
                photoBtn.classList.add('active');
                videoBtn.classList.remove('active');
                photoSec.classList.remove('hidden');
                videoSec.classList.add('hidden');
            } else {
                videoBtn.classList.add('active');
                photoBtn.classList.remove('active');
                videoSec.classList.remove('hidden');
                photoSec.classList.add('hidden');
            }
        }

        // Search feature
        function searchMedia() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            
            const photoCards = document.querySelectorAll('#photos-section .card');
            photoCards.forEach(card => {
                const title = card.querySelector('.card-title').innerText.toLowerCase();
                card.style.display = title.includes(input) ? "flex" : "none";
            });

            const videoCards = document.querySelectorAll('#videos-section .card');
            videoCards.forEach(card => {
                const title = card.querySelector('.card-title').innerText.toLowerCase();
                card.style.display = title.includes(input) ? "flex" : "none";
            });
        }

        // Modal Controls
        const modal = document.getElementById('uploadModal');
        const openBtn = document.getElementById('openUploadModal');
        const closeBtn = document.getElementById('closeUploadModal');

        openBtn.onclick = () => modal.style.display = "flex";
        closeBtn.onclick = () => modal.style.display = "none";

        window.onclick = (event) => {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // Upload functionality
        document.getElementById('mediaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('mediaTitle').value;
            const type = document.getElementById('mediaType').value;
            const fileInput = document.getElementById('mediaFileInput');

            if (fileInput.files && fileInput.files[0]) {
                const file = fileInput.files[0];
                const reader = new FileReader();

                reader.onload = function(e) {
                    const url = e.target.result;
                    if (type === 'photo') {
                        photos.push({ id: Date.now(), title: title, url: url });
                    } else {
                        videos.push({ id: Date.now(), title: title, url: url });
                    }

                    saveToStorage();
                    document.getElementById('mediaForm').reset();
                    modal.style.display = "none";
                    renderGallery();
                };
                reader.readAsDataURL(file);
            }
        });

        function toggleOwnerMode() {
            if (!isOwner) {
                let pass = prompt("Enter Owner Password (Hint: owner123):");
                if (pass === "owner123") {
                    isOwner = true;
                    alert("Owner mode activated!");
                    document.getElementById('ownerLoginBtn').innerText = "Owner: ON";
                    document.getElementById('ownerLoginBtn').style.borderColor = "#E60023";
                    document.getElementById('ownerLoginBtn').style.color = "#E60023";
                } else {
                    alert("Galat password!");
                }
            } else {
                isOwner = false;
                document.getElementById('ownerLoginBtn').innerText = "Owner Login";
                document.getElementById('ownerLoginBtn').style.borderColor = "#717171";
                document.getElementById('ownerLoginBtn').style.color = "#717171";
            }
            toggleDeleteButtonsVisibility();
        }

        function toggleDeleteButtonsVisibility() {
            const deleteBtns = document.querySelectorAll('.delete-btn');
            deleteBtns.forEach(btn => {
                btn.style.display = isOwner ? 'block' : 'none';
            });
        }

        function deleteItem(type, id) {
            if (!isOwner) return;
            let confirmDelete = confirm("Kya aap ye item hamesha ke liye delete karna chahte hain?");
            if (confirmDelete) {
                if (type === 'photo') {
                    photos = photos.filter(item => item.id !== id);
                } else {
                    videos = videos.filter(item => item.id !== id);
                }
                saveToStorage();
                renderGallery();
            }
        }

        // Initialize Layout
        renderGallery();
    </script>
</body>
</html>
